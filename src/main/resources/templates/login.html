<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-600 to-blue-500 min-h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-4xl font-bold text-center text-purple-600 mb-8">TaskFlow</h1>
        <h2 class="text-2xl font-semibold text-center mb-6">Welcome Back!</h2>

        <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
            Invalid username or password!
        </div>
        <div th:if="${param.logout}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post" class="space-y-6">
            <div>
                <input type="text" name="username" placeholder="Username" required autofocus
                       class="w-full px-5 py-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-4 focus:ring-purple-500">
            </div>
            <div>
                <input type="password" name="password" placeholder="Password" required
                       class="w-full px-5 py-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-4 focus:ring-purple-500">
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white font-bold py-4 rounded-lg hover:bg-purple-700 transition">
                Login
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600">
            Don't have an account? <a href="/register" class="text-purple-600 font-bold hover:underline">Register here</a>
        </p>
    </div>
</body>
</html>
