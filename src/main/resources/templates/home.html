<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <h1 class="text-3xl font-bold text-purple-600">TaskFlow</h1>
        <div class="flex items-center gap-6">
            <span class="text-lg">Hello, <strong th:text="${#authentication?.name} ?: 'User'">User</strong>!</span>
            <a href="/logout" class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 font-medium">Logout</a>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto p-8">
    <h2 class="text-4xl font-bold text-gray-800 mb-8">My Tasks</h2>

    <!-- Add Task Form -->
    <div class="bg-white p-8 rounded-xl shadow-lg mb-8">
        <form action="/add-task" method="post" class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <input name="title" placeholder="Task title..." required class="px-5 py-4 border rounded-lg">
            <input name="description" placeholder="Description" class="px-5 py-4 border rounded-lg">
            <select name="status" class="px-5 py-4 border rounded-lg">
                <option value="TODO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="DONE">Done</option>
            </select>
            <button class="bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-4 rounded-lg hover:opacity-90">
                Add Task
            </button>
        </form>
    </div>

    <!-- Tasks List - 100% SAFE -->
    <div th:each="task : ${tasks}" class="bg-white p-8 rounded-xl shadow-md mb-6">
        <!-- Color border using inline style -->
        <div th:style="'border-left: 8px solid ' + 
                     (${task.status} == 'DONE' ? '#22c55e' : 
                      (${task.status} == 'IN_PROGRESS' ? '#eab308' : '#ef4444'))">

            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <h3 class="text-2xl font-bold" th:text="${task.title}">Task</h3>
                    <p class="text-gray-600 mt-2" th:text="${task.description} ?: 'No description'"></p>

                    <!-- Status Badge - 100% safe -->
                    <span th:switch="${task.status}">
                        <span th:case="DONE" class="inline-block mt-4 px-6 py-2 rounded-full bg-green-500 text-white font-bold text-sm">DONE</span>
                        <span th:case="IN_PROGRESS" class="inline-block mt-4 px-6 py-2 rounded-full bg-yellow-500 text-white font-bold text-sm">IN PROGRESS</span>
                        <span th:case="*" class="inline-block mt-4 px-6 py-2 rounded-full bg-red-500 text-white font-bold text-sm">TODO</span>
                    </span>
                </div>

                <div class="flex gap-3 mt-4">
                    <a th:href="@{/edit-task/{id}(id=${task.id})}" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">Edit</a>
                    <form action="/delete-task" method="post" class="inline">
                        <input type="hidden" name="taskId" th:value="${task.id}">
                        <button class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-32 text-gray-500 text-2xl">
        No tasks yet. Create your first one!
    </div>
</div>

</body>
</html>
