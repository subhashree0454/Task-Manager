<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-600 to-pink-500 min-h-screen flex items-center justify-center">
  <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
    <h2 class="text-4xl font-bold text-center text-gray-800 mb-8">Join TaskFlow 🚀</h2>

    <form action="/register" method="post" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700">Username</label>
        <input type="text" name="username" required
               class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-4 focus:ring-purple-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" name="email" required
               class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-4 focus:ring-purple-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" name="password" required
               class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-4 focus:ring-purple-500">
      </div>
      <button type="submit"
              class="w-full bg-gradient-to-r from-green-500 to-teal-600 text-white font-bold py-4 rounded-lg hover:from-green-600 hover:to-teal-700 transform hover:-translate-y-1 transition">
        Create Account
      </button>
    </form>

    <p class="mt-6 text-center text-gray-600">
      Already have an account? <a href="/" class="text-purple-600 font-bold hover:underline">Login</a>
    </p>
  </div>
</body>
</html>
