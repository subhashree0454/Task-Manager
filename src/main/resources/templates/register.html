<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-pink-500 min-h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-4xl font-bold text-center text-indigo-600 mb-8">TaskFlow</h1>
        <h2 class="text-2xl font-semibold text-center mb-6">Create Account</h2>

        <form action="/register" method="post" class="space-y-6">
            <input type="text" name="username" placeholder="Choose a username" required
                   class="w-full px-5 py-4 border rounded-lg focus:ring-4 focus:ring-indigo-500">
            <input type="email" name="email" placeholder="Your email" required
                   class="w-full px-5 py-4 border rounded-lg focus:ring-4 focus:ring-indigo-500">
            <input type="password" name="password" placeholder="Create password" required
                   class="w-full px-5 py-4 border rounded-lg focus:ring-4 focus:ring-indigo-500">
            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-lg hover:bg-indigo-700 transition">
                Register
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600">
            Already have an account? <a href="/login" class="text-indigo-600 font-bold hover:underline">Login</a>
        </p>
    </div>
</body>
</html>
