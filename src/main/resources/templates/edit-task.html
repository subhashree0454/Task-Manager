<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-600 to-blue-500 min-h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-center text-purple-600 mb-8">Edit Task</h1>

        <form th:action="@{/edit-task/{id}(id=${task.id})}" method="post" class="space-y-6">
            <input type="text" name="title" th:value="${task.title}" required
                   class="w-full px-6 py-4 text-xl border rounded-lg focus:ring-4 focus:ring-purple-500">
            <textarea name="description" rows="4" th:text="${task.description}"
                      class="w-full px-6 py-4 border rounded-lg focus:ring-4 focus:ring-purple-500"></textarea>
            <select name="status" class="w-full px-6 py-4 border rounded-lg text-lg">
                <option value="TODO" th:selected="${task.status == 'TODO'}">To Do</option>
                <option value="IN_PROGRESS" th:selected="${task.status == 'IN_PROGRESS'}">In Progress</option>
                <option value="DONE" th:selected="${task.status == 'DONE'}">Done</option>
            </select>
            <div class="flex gap-4">
                <button type="submit" class="flex-1 bg-green-600 text-white py-4 rounded-lg font-bold hover:bg-green-700">
                    Save Changes
                </button>
                <a href="/home" class="flex-1 text-center bg-gray-600 text-white py-4 rounded-lg font-bold hover:bg-gray-700">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
