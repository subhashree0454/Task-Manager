<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-2xl">
    <h2 class="text-3xl font-bold text-center mb-8">Edit Task</h2>
    <form th:action="@{/edit-task/{id}(id=${task.id})}" method="post" class="space-y-6">
      <input type="text" name="title" th:value="${task.title}" required class="w-full px-4 py-3 border rounded-lg text-xl">
      <textarea name="description" rows="4" th:text="${task.description}" class="w-full px-4 py-3 border rounded-lg"></textarea>
      <select name="status" class="w-full px-4 py-3 border rounded-lg text-lg">
        <option value="TODO" th:selected="${task.status == 'TODO'}">TODO</option>
        <option value="IN_PROGRESS" th:selected="${task.status == 'IN_PROGRESS'}">In Progress</option>
        <option value="DONE" th:selected="${task.status == 'DONE'}">Done</option>
      </select>
      <div class="flex gap-4">
        <button class="flex-1 bg-green-600 text-white py-4 rounded-lg font-bold hover:bg-green-700">Save Changes</button>
        <a href="/home" class="flex-1 text-center bg-gray-500 text-white py-4 rounded-lg font-bold hover:bg-gray-600">Cancel</a>
      </div>
    </form>
  </div>
</body>
</html>
